<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="100%" max-width="720">
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1.5; rx: 8px; }
    .header { fill: #161b22; rx: 8px; }
    .dot { stroke-width: 0; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .title { font-family: 'Fira Code', Consolas, Monaco, monospace; font-size: 13px; fill: #8b949e; text-anchor: middle; }
    
    .terminal-text {
      font-family: 'Fira Code', Consolas, Monaco, monospace;
      font-size: 14px;
      fill: #e6edf3;
    }
    .prompt { fill: #58a6ff; font-weight: bold; }
    .cmd { fill: #00ff66; }
    .accent { fill: #ff7b72; }
    .string { fill: #a5d6ff; }
    .keyword { fill: #ff7b72; }
    
    /* Animation Configurations - Executed Once */
    .line { opacity: 0; animation: printLine 0.05s forwards; }
    .cursor { animation: blink 0.9s infinite; fill: #00ff66; }
    
    @keyframes printLine {
      to { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    /* Fast, Responsive Sequence Delays (Runs Once) */
    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.5s; }
    .l3 { animation-delay: 0.7s; }
    .l4 { animation-delay: 0.9s; }
    .l5 { animation-delay: 1.1s; }
    .l6 { animation-delay: 1.3s; }
    .l7 { animation-delay: 1.5s; }
    .l8 { animation-delay: 1.7s; }
    .l9 { animation-delay: 1.9s; }
  </style>
  
  <!-- Terminal Window Shadow & Canvas -->
  <rect width="720" height="360" class="bg" />
  <path d="M0,8 Q0,0 8,0 L712,0 Q720,0 720,8 L720,35 L0,35 Z" class="header" />
  
  <!-- Mac-style Window Controls -->
  <circle cx="20" cy="18" r="6" class="dot dot-red" />
  <circle cx="40" cy="18" r="6" class="dot dot-yellow" />
  <circle cx="60" cy="18" r="6" class="dot dot-green" />
  <text x="360" y="22" class="title">linhan@LH-exe:~</text>
  
  <!-- Content Space -->
  <g transform="translate(25, 70)" class="terminal-text">
    <!-- Command Execution -->
    <g class="line l1">
      <text x="0" y="0"><tspan class="prompt">linhan@LH-exe:~$</tspan> <tspan class="cmd">cat profile.json</tspan></text>
    </g>
    
    <!-- JSON Payload Initialization -->
    <g class="line l2">
      <text x="0" y="25"><tspan class="keyword">{</tspan></text>
    </g>
    <g class="line l3">
      <text x="20" y="55"><tspan class="accent">"identity"</tspan>: <tspan class="string">"Lin Han"</tspan>,</text>
    </g>
    
    <!-- Languages Array -->
    <g class="line l4">
      <text x="20" y="85"><tspan class="accent">"environments"</tspan>: <tspan class="keyword">[</tspan></text>
    </g>
    <g class="line l5">
      <text x="40" y="115"><tspan class="string">"JavaScript"</tspan>, <tspan class="string">"HTML"</tspan>, <tspan class="string">"CSS"</tspan>,</text>
    </g>
    <g class="line l6">
      <text x="40" y="145"><tspan class="string">"Python"</tspan>, <tspan class="string">"Lua"</tspan>, <tspan class="string">"Java"</tspan></text>
    </g>
    <g class="line l7">
      <text x="20" y="175"><tspan class="keyword">]</tspan>,</text>
    </g>
    
    <!-- Active Development Tracker -->
    <g class="line l8">
      <text x="20" y="205"><tspan class="accent">"active_project"</tspan>: <tspan class="string">"Hexnet"</tspan></text>
    </g>
    <g class="line l9">
      <text x="0" y="235"><tspan class="keyword">}</tspan></text>
    </g>
    
    <!-- Next Prompt + Active Blinking Cursor -->
    <g class="line l9" transform="translate(0, 265)">
      <text x="0" y="0"><tspan class="prompt">linhan@LH-exe:~$</tspan></text>
      <rect x="135" y="-12" width="8" height="15" class="cursor" />
    </g>
  </g>
</svg>
